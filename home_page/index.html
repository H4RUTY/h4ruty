<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HARUTO KOIKE'S HOME PAGE</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: #eee;
            width: 100vw;
            margin: 0;
            -webkit-font-smoothing: none;
            font-smooth: never;
            image-rendering: pixelated;
        }
        ::selection {
            color: #fff;
            background-color: #00f;
        }
        .polka-dot {
            background-color: #ddd;
            background-image: radial-gradient(circle, #999 1px, transparent 1px);
        }
        .container {
            width: 100vw;
            height: 100vh;
            overflow: scroll;
        }
        .container::-webkit-scrollbar {
            width:  20px;
            height: 20px;
            background-color: #ddd;
            background-image: radial-gradient(circle, #999 0.5px, transparent 0.5px), radial-gradient(circle, #999999 0.5px, transparent 0.5px);
            background-position: 0 0, 1.5px 3px;
            background-size: 3px 6px;
            border-top:    1.5px solid #bbb;
            border-left:   1.5px solid #bbb;
            border-right:  1.5px solid #ddd;
            border-bottom: 1.5px solid #ddd;

        }
        .container::-webkit-scrollbar-thumb {
            background-color: #999;
            border-top:    2px solid #fff;
            border-left:   2px solid #fff;
            border-right:  2px solid #666;
            border-bottom: 2px solid #666;
        }
        .container::-webkit-scrollbar-button {
            display: block;
            background-color: #999;
            border-top:    1px solid #fff;
            border-left:   2px solid #fff;
            border-right:  2px solid #666;
            border-bottom: 1px solid #666;
            text-align: center;
        }
        .container::-webkit-scrollbar-button:hover {
            background-color: #bbb;
            border-top:    1px solid #666;
            border-left:   2px solid #666;
            border-right:  2px solid #fff;
            border-bottom: 1px solid #fff;
            text-align: center;
        }
       .container::-webkit-scrollbar-button:start:increment,
        .container::-webkit-scrollbar-button:end:decrement {
            display: none;
        }
        .container::-webkit-scrollbar-button:vertical:start:decrement {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 20 20'><polygon points='10,4 6,10 14,10' fill='%23000000'/></svg>");
        }
        .container::-webkit-scrollbar-button:vertical:end:increment {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 20 20'><polygon points='10,10 6,4 14,4' fill='%23000000'/></svg>");
        }
        .container::-webkit-scrollbar-button:horizontal:start:decrement {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 20 20'><polygon points='4,10 10,6 10,16' fill='%23000000'/></svg>");
        }
        .container::-webkit-scrollbar-button:horizontal:end:increment {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 20 20'><polygon points='10,10 4,6 4,16' fill='%23000000'/></svg>");
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>HARUTO KOIKE'S HOME PAGE</h1>
        <p>Hello!</p>
        <div style="width: 150%; height: 10000px;"></div>
        <p>EOF</p>
    </div>
</body>
</html>
